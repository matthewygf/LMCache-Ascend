# Qwen3-30B-A3B-Instruct-2507 (MoE) — TP=4 LMCache config, receiver side.
# Port range 98xx is disjoint from the 8B TP=2 configs (99xx) so both
# setups can run on the same host without collision.

chunk_size: 512
local_cpu: True
# 150 GiB of host KV — far above the historical ~20 GB driver registration
# limit for hccl/hcomm_onesided. The hccl_pingpong channel does NOT register
# user buffers with the NIC (only its 32 MiB staging region), so this size is
# safe regardless of HDK version. The LMCACHE_MAX_LOCAL_CPU_SIZE env var, if
# set, overrides this value at runtime.
max_local_cpu_size: 150
use_layerwise: False
# Required for P2P sharing under TP>1: every TP rank must persist its own
# shard locally so the controller can route per-rank lookups to the right
# peer worker. Without this, only rank 0 stores and remote rank>0 pulls miss.
save_only_first_rank: False
enable_async_loading: False
store_async: True

# P2P configurations
enable_p2p: True
p2p_host: "localhost" # replace with the host ip
p2p_init_ports: [9880, 9881, 9882, 9883] # per TP rank
p2p_lookup_ports: [9884, 9885, 9886, 9887] # per TP rank
# Receiver-driven HCCL ping-pong channel. Requires CANN 8.5+ and is
# routed through the staging BatchChannel (see hccl_pingpong_channel.py).
transfer_channel: "hccl_pingpong"
p2p_use_npu: True
p2p_pull_mode: True
# Delay pull lets the NPU connector overlap remote reads with paged-cache
# scatter via ProxyMemoryObj.submit_resolve_batch + the channel's
# submit_batched_read.
p2p_delay_pull: True
# 128 MiB NPU landing staging. Bumped to 1 GiB if you observe in-flight
# chunk throttling under concurrent retrieval.
p2p_npu_buffer_size: 134217728

# Controller configurations
enable_controller: True
lmcache_instance_id: "lmcache_instance_2"
controller_pull_url: "localhost:9800" # replace with the controller pull url
controller_reply_url: "localhost:9900" # replace with the controller reply url
lmcache_worker_ports: [9858, 9859, 9860, 9861] # per TP rank

extra_config:
  lookup_backoff_time: 0.001
  # Optional ping-pong tuning. Defaults inside PingPongConfig are used
  # when these are unset; values shown here match the channel defaults
  # and are commented for documentation only.
  # pp_chunk_size_bytes: 2097152   # 2 MiB chunks on the BatchChannel wire
  # pp_n_chunks_per_buff: 8        # chunks per ping-pong staging buffer
  # pp_n_buffs: 2                  # MUST be 2 (ping/pong)
  # pp_wait_recv_done: true        # sender waits for the final recv-done notify
  # pp_tc: 0                       # RoCE traffic class
  # pp_sl: 0                       # RoCE service level
  # pp_transfer_bind_addr: "0.0.0.0:0"
  # pp_advertised_host: "<routable_ip>"  # auto-derived from p2p_host
